name: CI Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-test:
    name: Cargo Test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run Cargo Test
        run: cargo test
