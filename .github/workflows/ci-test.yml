name: CI Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-test:
    name: Verify Linux Bwrap Fix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run Linux bwrap regression test
        run: cargo test sandbox::linux::bwrap::tests::test_generate_bwrap_command_mounts_dev_after_readonly_root --lib -- --nocapture
